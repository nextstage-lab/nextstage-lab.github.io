<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次世代ラボ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#05070d;
color:white;
overflow-x:hidden;
}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

background:linear-gradient(135deg,#05070d,#0d1d3a);

}

h1{

font-size:60px;

margin-bottom:20px;

color:#4ea3ff;

text-shadow:0 0 25px #3b82f6;

}

p{

font-size:22px;

opacity:.8;

margin-bottom:40px;

}

.button{

padding:18px 45px;

background:#3b82f6;

color:white;

text-decoration:none;

border-radius:50px;

font-size:22px;

transition:.3s;

box-shadow:0 0 20px #3b82f6;

}

.button:hover{

transform:scale(1.08);

box-shadow:0 0 40px #60a5fa;

}

footer{

text-align:center;

padding:40px;

opacity:.5;

}

</style>

</head>

<body>

<section class="hero">

<h1>次世代ラボ</h1>

<p>

AI・Web3・未来技術を創造するラボ

</p>

<a class="button" href="#">

Coming Soon

</a>

</section>

<footer>

© 2026 次世代ラボ

</footer>

</body>

</html>
